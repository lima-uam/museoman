services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: museoman
      POSTGRES_PASSWORD: museoman
      POSTGRES_DB: museoman
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U museoman -d museoman"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
